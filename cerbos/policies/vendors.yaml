apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "vendors"
  rules:
    # 1a. Admin can ALWAYS create, show, and list
    - actions: ["create", "show", "list"]
      effect: EFFECT_ALLOW
      roles:
        - admin

    # 1b. Admin can ONLY edit/delete if managed is false
    - actions: ["edit", "delete"]
      effect: EFFECT_ALLOW
      roles:
        - admin
      condition:
        match:
          expr: request.resource.attr.managed == false

    # 2. Viewer (no changes)
    - actions: ["show", "list"]
      effect: EFFECT_ALLOW
      roles:
        - owner
        - viewer
